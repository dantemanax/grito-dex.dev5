<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grito-Dex Pro | v10.3</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body id="app-body" class="theme-1">
    <div class="pokedex-case">
        <div class="top-header">
            <div class="blue-eye-container">
                <div class="blue-eye" id="status-light"></div>
            </div>
            <div class="light-dots">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
            </div>
        </div>
        <div class="brand-header">
            <h1 class="main-title">GRITO-DEX</h1>
            <div class="decor-line"></div>
        </div>
        <div class="nav-tabs">
            <button id="btn-game" class="active">JUGAR</button>
            <button id="btn-view-gritodex">MY DEX</button>
        </div>
        <div class="pokedex-screen">
            <div class="screen-glass">
                <div id="game-view">
                    <div class="controls-top">
                        <select id="gen-select" class="retro-select">
                            <option value="1">GEN 1</option>
                            <option value="2">GEN 2</option>
                            <option value="3">GEN 3</option>
                            <option value="4">GEN 4</option>
                            <option value="5">GEN 5</option>
                            <option value="6">GEN 6</option>
                            <option value="7">GEN 7</option>
                            <option value="8">GEN 8</option>
                            <option value="9">GEN 9</option>
                            <option value="all">TODAS</option>
                        </select>
                        <button id="play-btn">OÍR</button>
                    </div>
                    <div id="main-screen" class="options-list"></div>
                    <div id="feedback" class="hidden">
                        <p id="message"></p>
                        <button id="next-btn">SIGUIENTE</button>
                    </div>
                </div>
                <div id="gritodex-view" class="hidden">
                    <h3 class="dex-counter">VISTOS: <span id="count">0</span></h3>
                    <div id="gritodex-list"></div>
                </div>
            </div>
        </div>
        <div class="pokedex-footer">
            <div class="vent-lines">
                <span></span><span></span><span></span><span></span>
            </div>
            <div class="d-pad-container">
                <div class="d-pad"></div>
            </div>
        </div>
    </div>
    <audio id="snd-success" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="snd-error" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>
    <script src="script.js"></script>
</body>
</html>
